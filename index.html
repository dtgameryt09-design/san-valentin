<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flores Amarillas para Liz 🌻</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@300;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root { --amarillo: #ffda00; --crema: #fffdf2; --verde: #4a5d23; }
        body { margin: 0; background-color: var(--crema); font-family: 'Montserrat', sans-serif; color: #333; overflow-x: hidden; }

        /* Vinilo */
        .music-player { position: fixed; top: 15px; right: 15px; z-index: 1000; cursor: pointer; text-align: center; }
        .disc { width: 55px; height: 55px; background: #222; border-radius: 50%; border: 3px solid var(--amarillo); animation: rotate 4s linear infinite; animation-play-state: paused; display: flex; align-items: center; justify-content: center; }
        .disc::after { content: '💛'; font-size: 18px; }
        .playing .disc { animation-play-state: running; }
        
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* Flores cayendo */
        .sunflower { position: fixed; top: -10%; pointer-events: none; z-index: 99; animation: fall linear infinite; }
        @keyframes fall { to { transform: translateY(110vh) rotate(360deg); } }

        section { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box; }
        h1 { font-family: 'Dancing Script', cursive; font-size: 2.5rem; color: var(--amarillo); text-align: center; margin: 0; }

        .photo-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; margin: 20px 0; }
        .photo-frame { background: white; padding: 10px; border-radius: 2px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); width: 260px; }
        .photo-frame img { width: 100%; height: auto; display: block; background: #eee; }
        .photo-frame p { font-family: 'Dancing Script'; margin: 10px 0 0; font-size: 1.2rem; text-align: center; color: var(--verde); }

        .btn-flower { background: var(--amarillo); border: none; padding: 15px 30px; border-radius: 50px; font-weight: 600; cursor: pointer; font-size: 1rem; margin-top: 15px; z-index: 101; }
    </style>
</head>
<body>

    <div class="music-player" id="player" onclick="toggleMusic()">
        <div class="disc"></div>
        <small style="display:block; margin-top:5px; font-weight:bold; color:var(--verde); font-size:10px;">YELLOW 🎵</small>
    </div>

    <section>
        <h1>¡Feliz Día de las Flores Amarillas, Liz!</h1>
        
        <div class="photo-container">
            <div class="photo-frame" style="transform: rotate(-2deg);">
                <img src="Screenshot_20260321-200359_1.jpg" alt="Ramo Real">
                <p>El ramo de girasoles reales 🌻</p>
            </div>
            <div class="photo-frame" style="transform: rotate(2deg);">
                <img src="Screenshot_20260321-201410_1.jpg" alt="Ramo Dibujado">
                <p>Para mi lugar seguro 🌼</p>
            </div>
        </div>

        <button class="btn-flower" onclick="celebrate()">¡Toca para florecer!</button>
    </section>

    <section style="background: #fffef2; border-top: 2px dashed var(--amarillo);">
        <img src="Screenshot_20260321-201744_2.jpg" style="width: 140px; border-radius: 8px; margin-bottom: 20px;" alt="Flor">
        <p style="text-align: center; font-size: 1.1rem; color: var(--verde); padding: 0 20px;">
            "Gracias por ser mi sol. ¡Te quiero mucho!" 💛
        </p>
        <div style="margin-top: 20px; width: 100%; max-width: 300px;">
            <iframe style="border-radius:12px" src="http://googleusercontent.com/spotify.com/4" width="100%" height="80" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
        </div>
    </section>

    <script>
        function spawnFlower() {
            const f = document.createElement('div');
            f.className = 'sunflower';
            f.innerHTML = ['🌻', '🌼', '💛'][Math.floor(Math.random()*3)];
            f.style.left = Math.random() * 100 + 'vw';
            f.style.fontSize = (Math.random() * 20 + 15) + 'px';
            f.style.animationDuration = (Math.random() * 3 + 3) + 's';
            document.body.appendChild(f);
            setTimeout(() => f.remove(), 6000);
        }
        setInterval(spawnFlower, 500);

        function toggleMusic() {
            document.getElementById('player').classList.toggle('playing');
        }

        function celebrate() {
            confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 }, colors: ['#ffda00', '#ffffff'] });
        }
    </script>
</body>
</html>
