<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flores Amarillas para Ti ✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@300;500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --amarillo-pastel: #fefae0;
            --amarillo-fuerte: #ffc300;
            --verde: #606c38;
            --texto: #283618;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--amarillo-pastel);
            font-family: 'Montserrat', sans-serif;
            color: var(--texto);
            overflow-x: hidden;
            text-align: center;
        }

        /* Animación de flores cayendo */
        .flower-rain {
            position: fixed;
            top: -10%;
            pointer-events: none;
            z-index: 100;
            animation: fall linear infinite;
        }

        @keyframes fall {
            to { transform: translateY(110vh) rotate(360deg); }
        }

        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 3.5rem;
            color: var(--amarillo-fuerte);
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
            margin: 10px 0;
        }

        .mensaje {
            font-size: 1.1rem;
            max-width: 300px;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        /* El Ramo Animado */
        .bouquet {
            font-size: 100px;
            cursor: pointer;
            transition: transform 0.3s;
            display: inline-block;
        }

        .bouquet:hover {
            transform: scale(1.1) rotate(5deg);
        }

        .footer-text {
            margin-top: 50px;
            font-size: 0.9rem;
            font-style: italic;
            color: var(--verde);
        }

        /* Botón Aesthetic */
        .btn-regalo {
            background-color: var(--amarillo-fuerte);
            color: white;
            padding: 15px 30px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(255, 195, 0, 0.4);
            display: inline-block;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <section class="hero">
        <div class="bouquet" id="ramo" onclick="lanzarFlores()">🌻</div>
        <h1>Flores Amarillas</h1>
        <p class="mensaje">
            "Porque te mereces que te regalen flores siempre, pero hoy más que nunca." ✨
        </p>
        <div id="btn-container">
            <a href="#" class="btn-regalo" onclick="lanzarFlores()">¡Toca para ver la sorpresa!</a>
        </div>
        <p class="footer-text">Con mucho cariño para Liz ❤️</p>
    </section>

    <script>
        // Función para crear lluvia de flores
        function createFlower() {
            const flowers = ['🌻', '🌼', '💛', '✨'];
            const flower = document.createElement('div');
            flower.className = 'flower-rain';
            flower.innerText = flowers[Math.floor(Math.random() * flowers.length)];
            flower.style.left = Math.random() * 100 + 'vw';
            flower.style.animationDuration = Math.random() * 3 + 2 + 's';
            flower.style.fontSize = Math.random() * 20 + 20 + 'px';
            document.body.appendChild(flower);

            setTimeout(() => {
                flower.remove();
            }, 5000);
        }

        setInterval(createFlower, 300);

        // Confeti de flores al hacer clic
        function lanzarFlores() {
            var count = 200;
            var defaults = { origin: { y: 0.7 } };

            function fire(particleRatio, opts) {
                confetti({
                    ...defaults,
                    ...opts,
                    particleCount: Math.floor(count * particleRatio),
                    colors: ['#FFD700', '#FFA500', '#FFFF00']
                });
            }

            fire(0.25, { spread: 26, startVelocity: 55 });
            fire(0.2, { spread: 60 });
            fire(0.35, { spread: 100, decay: 0.91, scalar: 0.8 });
            fire(0.1, { spread: 120, startVelocity: 25, decay: 0.92, scalar: 1.2 });
            fire(0.1, { spread: 120, startVelocity: 45 });
        }
    </script>
</body>
</html>
