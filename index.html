<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flores Amarillas para Liz 🌻</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@300;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root { 
            --amarillo: #ffda00; 
            --crema: #fffdf2; 
            --verde: #4a5d23; 
            --dorado-oscuro: #b8860b;
        }
        
        body { 
            margin: 0; 
            background-color: var(--crema); 
            font-family: 'Montserrat', sans-serif; 
            color: #333; 
            overflow-x: hidden;
            /* Ajuste de zoom general para que todo quepa en pantalla */
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Lluvia de Flores */
        .sunflower { position: fixed; top: -10%; pointer-events: none; z-index: 99; animation: fall linear infinite; }
        @keyframes fall { to { transform: translateY(110vh) rotate(360deg); } }

        /* Contenedor Principal con Zoom ajustado */
        .main-content {
            width: 100%;
            max-width: 400px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            box-sizing: border-box;
        }

        h1 { 
            font-family: 'Dancing Script', cursive; 
            font-size: 2.2rem; 
            color: var(--amarillo); 
            margin-bottom: 15px;
            text-shadow: 1px 1px 5px rgba(0,0,0,0.1);
        }

        .dedicatoria {
            font-size: 1.1rem;
            line-height: 1.5;
            color: var(--verde);
            font-weight: 600;
            margin-bottom: 25px;
            padding: 0 10px;
        }

        /* Galería sin textos */
        .photo-container { 
            display: flex; 
            flex-direction: column;
            gap: 15px; 
            margin-bottom: 25px; 
        }
        
        .photo-frame { 
            background: white; 
            padding: 10px; 
            border-radius: 2px; 
            box-shadow: 0 8px 15px rgba(0,0,0,0.1); 
            width: 250px; /* Zoom ajustado */
        }
        
        .photo-frame img { 
            width: 100%; 
            height: auto; 
            display: block; 
        }

        /* Botón Ajustado */
        .btn-flower { 
            background: linear-gradient(145deg, var(--amarillo), #e6c200);
            border: none; 
            padding: 15px 40px; 
            border-radius: 50px; 
            font-weight: 700; 
            color: #554400;
            cursor: pointer; 
            font-size: 1.1rem; 
            box-shadow: 0 5px 15px rgba(218, 165, 32, 0.4);
            transition: 0.3s;
            z-index: 101;
            text-transform: lowercase;
        }
        
        .btn-flower:active { transform: scale(0.95); }

        /* Reproductor de Spotify con volumen ajustado visualmente */
        .spotify-box {
            margin-top: 30px;
            width: 100%;
            max-width: 300px;
            z-index: 101;
        }
    </style>
</head>
<body>

    <div class="main-content">
        <h1>Flores Amarillas para Liz ✨</h1>
        
        <p class="dedicatoria">
            "un pequeño detalle para ti Liz se que no son reales Pero pronto lo serán mi niña"
        </p>

        <div class="photo-container">
            <div class="photo-frame" style="transform: rotate(-2deg);">
                <img src="Screenshot_20260321-200359_1.jpg" alt="Foto 1">
            </div>
            <div class="photo-frame" style="transform: rotate(2deg);">
                <img src="Screenshot_20260321-201410_1.jpg" alt="Foto 2">
            </div>
        </div>

        <button class="btn-flower" onclick="celebrate()">toca para florecer</button>

        <div class="spotify-box">
            <iframe style="border-radius:12px" src="http://googleusercontent.com/spotify.com/5" width="100%" height="80" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
        </div>
        
        <img src="Screenshot_20260321-201744_2.jpg" style="width: 100px; margin-top: 30px; border-radius: 50%;" alt="Flor Final">
    </div>

    <script>
        // Lluvia de Flores
        function spawnFlower() {
            const f = document.createElement('div');
            f.className = 'sunflower';
            f.innerHTML = ['🌻', '🌼', '💛'][Math.floor(Math.random()*3)];
            f.style.left = Math.random() * 100 + 'vw';
            f.style.fontSize = (Math.random() * 20 + 15) + 'px';
            f.style.animationDuration = (Math.random() * 3 + 4) + 's';
            document.body.appendChild(f);
            setTimeout(() => f.remove(), 7000);
        }
        setInterval(spawnFlower, 500);

        // Confeti
        function celebrate() {
            confetti({ 
                particleCount: 150, 
                spread: 70, 
                origin: { y: 0.7 }, 
                colors: ['#ffda00', '#ffffff', '#ffd700'] 
            });
        }
    </script>
</body>
</html>
