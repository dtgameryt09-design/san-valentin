        :root {
            --amarillo: #ffda00;

        body {
            margin: 0; background-color: var(--crema);
            font-family: 'Montserrat', sans-serif; color: #333;
            overflow-x: hidden; scroll-behavior: smooth;

        /* Vinilo Giratorio - Decorativo */
        .music-player {
            position: fixed; top: 20px; right: 20px; z-index: 1000;
            cursor: pointer; text-align: center;
        }
        .disc {
            width: 65px; height: 65px; background: #222;
            border-radius: 50%; border: 4px solid var(--amarillo);
            animation: rotate 4s linear infinite; animation-play-state: paused;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .disc::after { content: '💛'; font-size: 20px; }
        .playing .disc { animation-play-state: running; }
        
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* Lluvia de Flores */
        .sunflower {
            position: fixed; top: -10%; pointer-events: none;
            z-index: 99; animation: fall linear infinite;
        }
        @keyframes fall { to { transform: translateY(110vh) rotate(360deg); } }
